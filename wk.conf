# wk (workspace manager) bindings
# vim: ft=tmux
#
# Source from tmux.conf (after bindings.conf, before themes):
#   source-file ~/.config/tmux/conf/wk.conf
#
# `wk` sessions appear in sesh's `K` / `T` / `R` pickers automatically —
# this file only adds wk-specific bindings, the pane-border format so the
# 4-pane layout reads cleanly, and resurrect/continuum exclusion.

# ── pane border format ──
# Show "<idx>: <command>" above each pane so the 4-pane layout is legible.
# Inherits border colors from the active theme (lubberland.tmux).
set -g pane-border-status top
set -g pane-border-format " #{?pane_active,#[bold],}#{pane_index}: #{pane_current_command} "

# ── passthrough for TUI tools ──
# Yazi (and other modern TUIs) probe the host terminal for kitty-graphics /
# sixel support at startup. Without passthrough, those probes time out and
# yazi greets you with "Terminal response timeout". `on` allows the bypass
# only when a local client is attached, which is what we want for popups.
set -g allow-passthrough on

# ── install sentinel ──
# `wk doctor` checks this to tell whether the tmux bindings are actually
# loaded — a mise-only install gets the binary but not this file, and the
# user would otherwise find that none of the documented keystrokes work.
set -g @wk-conf-loaded 1

# ── wk-specific bindings ──
# Lowercase letters are reserved for sesh/window shortcuts, so wk uses
# uppercase letters. The `W` prefix is free in your bindings.conf.

# prefix W      fzf-tmux popup running `wk switch` — the primary way to
#               switch between wk workspaces. Has preview (task + commits +
#               status), j/k nav, ctrl-n to create, ctrl-d to remove.
#               The sidebar pane is read-only; this popup is the input surface.
bind-key -N "wk: workspace switcher" W \
  display-popup -E -w 90% -h 80% \
  "sh -c 'wk switch || { echo; echo \"press any key to dismiss\"; read _; }'"

# prefix O      fzf-tmux popup over all local + remote branches; pick one
#               to materialize as a wk workspace via `wk open --pick`.
#               Complements `prefix W` (switch between existing wk workspaces)
#               for the "I want to start working on branch X" case.
bind-key -N "wk: open existing branch" O \
  display-popup -E -w 90% -h 80% \
  "sh -c 'wk open --pick || { echo; echo \"press any key to dismiss\"; read _; }'"

# prefix X      close the current wk workspace — kill its tmux session but
#               keep the worktree on disk. `wk open <branch>` brings it back.
#               For full destruction (rm worktree + branch), use `prefix D` or
#               `prefix W` → `ctrl-d` on the highlighted workspace.
bind-key -N "wk: close current workspace" X run-shell "wk close"

# prefix D      destroy the current wk workspace — kill session + remove
#               worktree + delete branch. Irreversible (modulo git reflog).
#               Asks for confirmation via a tmux prompt; type 'yes' to proceed.
#               Runs plain `wk rm` (NOT --force), so it refuses on a dirty
#               worktree rather than discarding uncommitted work behind the
#               prompt. To force past a dirty tree, run `wk rm --force` from a
#               shell deliberately.
bind-key -N "wk: destroy current workspace" D \
  command-prompt -p "destroy current workspace? type 'yes':" \
  "run-shell 'if [ \"%%\" = yes ]; then wk rm; else tmux display-message wk:cancelled; fi'"

# prefix C-w    prompt for new workspace branch and create it.
bind-key -N "wk: new workspace" C-w command-prompt \
  -p "wk new branch:" "run-shell 'wk new %%'"

# prefix M-g    lazygit, summoned full-screen in a popup at the active pane's
#               cwd. There's no always-on lazygit pane any more — this opens it
#               where you're working and closes when you quit (q). Falls back to
#               a message if lazygit isn't installed.
bind-key -N "wk: lazygit (popup)" M-g \
  display-popup -E -w 90% -h 90% -d "#{pane_current_path}" \
  "sh -c 'if command -v lazygit >/dev/null; then lazygit || { echo; echo \"lazygit exited (not a git repo?) — press any key\"; read _; }; else echo \"lazygit not installed — https://github.com/jesseduffield/lazygit\"; echo; echo \"press any key to dismiss\"; read _; fi'"

# prefix M-t    orchestrator: status table of all task workspaces. Read-only
#               popup; press any key to dismiss.
bind-key -N "wk: task status (orchestrator)" M-t \
  display-popup -E -w 90% -h 70% \
  "sh -c 'wk task-status; echo; echo \"press any key to dismiss\"; read _;'"

# prefix M-r    force an immediate refresh of the wk dashboard. The dashboard
#               normally re-renders every 30s; this skips the wait. SIGUSR1
#               wakes its sleep without restarting the process.
bind-key -N "wk: refresh dashboard" M-r run-shell \
  "pkill -USR1 -f 'wk _dashboard-render' >/dev/null 2>&1 || true"

# ── non-prefix bindings (uncomment / change keys to taste) ──────────────────
# Cycle through running wk sessions like browser tabs. The `-n` flag means
# "no prefix" — these fire on the bare keystroke. Only @wk-tagged sessions
# are in the cycle, so plain tmux sessions don't get in the way.
#
# M-] / M-[ work everywhere. Ctrl-Tab is friendlier but only some terminals
# forward it (kitty, WezTerm yes; macOS Terminal.app no). For Ctrl-Tab to
# reach tmux you also need `set -g xterm-keys on` and an `xterm-keys`-aware
# terminfo.
bind-key -n M-]   run-shell "wk cycle next"
bind-key -n M-[   run-shell "wk cycle prev"
bind-key -n M-m   run-shell "wk cycle last"   # toggle to last visited (alt-tab style)

# Example: Ctrl-Tab / Ctrl-Shift-Tab variant. Uncomment if your terminal
# forwards these correctly.
# bind-key -n C-Tab          run-shell "wk cycle next"
# bind-key -n C-S-Tab        run-shell "wk cycle prev"

# prefix M-w    rebalance the wk pane layout back to its defaults after you've
#               dragged borders around. `wk rebalance` reads the session's
#               @wk-layout tag and applies the right geometry — the widescreen
#               (5-pane) and laptop (2-column) layouts have different targets,
#               so the sizes live in one place in `wk`, not duplicated here.
bind-key -N "wk: rebalance panes" M-w run-shell "wk rebalance"

# ── tmux-resurrect / tmux-continuum exclusion ──
# wk sessions are ephemeral by design: the agent (Claude Code), the sidebar
# loop, and the file-watcher loop don't usefully resurrect. Worktrees persist
# on disk regardless, so layouts can be rebuilt with `wk restore`.
#
# Strategy: a post-save hook that strips wk-managed sessions from the
# resurrect dump after it's written. wk sessions are identified by the `@wk`
# tmux user option, which `wk new` sets when building each session.
#
# Comment this block out if you'd rather have resurrect attempt to restore
# wk sessions. (Even then, `wk restore` remains a faster, cleaner option.)
set -g @resurrect-hook-post-save-all \
  '~/.config/tmux/bin/wk-resurrect-filter'

# Notes:
# - This hook runs AFTER resurrect writes the dump, so it edits the file in
#   place. Other resurrect functionality is unaffected — only wk sessions are
#   stripped.
# - tmux-continuum invokes the same save path, so this filter applies to
#   continuum auto-saves too. No separate continuum setting is needed.
# - The filter script must be executable and at the path above. Adjust the
#   path if you install it elsewhere.

# ── usage notes ──
# - Pane navigation: existing vim-tmux-navigator C-h/j/k/l bindings.
# - Pane zoom: default `prefix z` (also `DoubleClick1Status`).
# - Session switching: existing sesh bindings (K/T/R/L).
# - Workspace removal: from the sidebar pane, Ctrl-D on the highlighted row.
# - After reboot: `wk restore` (no args) rebuilds layouts for all worktrees
#   that survive on disk; `wk restore <branch>` rebuilds just one.
