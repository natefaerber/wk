name: release

# Tag a version to ship it:
#   git tag v0.1.0 && git push origin v0.1.0
#
# The job validates the wk script, then publishes a GitHub release with
# the standalone `wk` file attached. Users install via mise:
#   mise use -g "github:natefaerber/wk[asset_pattern=wk,bin=wk]"
# install.sh users get the source from GitHub's auto-generated tarball.
#
# The asset_pattern=wk option tells mise's github backend to grab the lone
# `wk` asset by exact name instead of trying to match a platform suffix —
# wk is a portable Python script, so one file works on every platform.
# (We were on the now-deprecated `ubi:` backend, which did this automatically;
# the replacement `github:` backend requires the explicit pattern.)

on:
  push:
    tags:
      - 'v*'
  # workflow_dispatch lets us run the validate+build steps without tagging,
  # to catch problems before cutting a real release. The publish step is
  # gated on the tag ref, so manual runs don't create empty releases.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Extract version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            version="${GITHUB_REF#refs/tags/v}"
          else
            version="0.0.0-dryrun"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Check version lockstep with the tag
        # The version lives in three places that ship independently: the CLI
        # (`__version__` in `wk`), and the Claude Code plugin's two manifests
        # (.claude-plugin/). Fail the release if any wasn't bumped to match the
        # tag. Skipped on workflow_dispatch dry-runs (no tag).
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          pv=$(python3 -c "import json;print(json.load(open('.claude-plugin/plugin.json'))['version'])")
          mv=$(python3 -c "import json;print(json.load(open('.claude-plugin/marketplace.json'))['plugins'][0]['version'])")
          cv=$(python3 -c "import re;print(re.search(r'^__version__ = \"([^\"]+)\"', open('wk').read(), re.M).group(1))")
          if [ "$pv" != "$VERSION" ] || [ "$mv" != "$VERSION" ] || [ "$cv" != "$VERSION" ]; then
            echo "::error::version mismatch — tag=$VERSION wk=$cv plugin.json=$pv marketplace.json=$mv. Bump all three to match the tag before releasing."
            exit 1
          fi
          echo "versions match tag v$VERSION (wk + both plugin manifests)"

      - name: Set up uv
        # Pin to an exact release: astral-sh/setup-uv publishes no moving `v8`
        # major tag (only `v7` and exact tags like `v8.1.0`), so `@v8` fails to
        # resolve.
        uses: astral-sh/setup-uv@v8.1.0

      - name: Validate wk script
        # Two checks: syntactic (cheap) and runtime (catches missing deps,
        # typer wiring breakage). uv resolves the inline /// script /// deps
        # the same way end users will.
        run: |
          python3 -c "import ast; ast.parse(open('wk').read())"
          ./wk --help > /dev/null

      - name: Build release assets
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          mkdir -p dist
          # The canonical asset. `mise … [asset_pattern=wk]` and install.sh users
          # rely on this exact name; keep it.
          install -m 0755 wk dist/wk
          # wk is one portable script for every platform, but mise's `github:`
          # backend, with no asset_pattern, autodetects by scoring OS/arch tokens
          # in the asset NAME — a lone `wk` has none, so a bare
          # `mise use github:natefaerber/wk` looks for an arch-specific asset and
          # errors ("no matching asset"). Publish identical copies under the
          # common target-triple names so autodetection finds a match on each
          # platform; mise strips the OS/arch suffix, so the installed bin is
          # still `wk`. (Old, stricter mise versions need this; newer ones accept
          # the lone `wk`. Either way the bare command now just works.)
          for triple in \
            aarch64-apple-darwin x86_64-apple-darwin \
            x86_64-unknown-linux-gnu aarch64-unknown-linux-gnu; do
            install -m 0755 wk "dist/wk-$triple"
          done
          ( cd dist && sha256sum wk wk-* > wk.sha256 )
          ls -l dist

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          gh release create "$TAG" \
            --title "wk $TAG" \
            --generate-notes \
            dist/wk \
            dist/wk-* \
            dist/wk.sha256
